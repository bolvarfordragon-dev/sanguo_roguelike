<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="92" fill="none" stroke="#8b6914" stroke-width="4"/>
  <!-- Crossed swords (三国) -->
  <g transform="translate(256 256)">
    <!-- Sword 1 -->
    <g transform="rotate(-30)">
      <rect x="-8" y="-160" width="16" height="260" fill="url(#gold)" stroke="#5a3f0a" stroke-width="2"/>
      <rect x="-50" y="80" width="100" height="20" fill="url(#gold)" stroke="#5a3f0a" stroke-width="2" rx="4"/>
      <circle cx="0" cy="130" r="14" fill="#d4a017" stroke="#5a3f0a" stroke-width="2"/>
      <rect x="-6" y="140" width="12" height="40" fill="#5a3f0a"/>
    </g>
    <!-- Sword 2 -->
    <g transform="rotate(30)">
      <rect x="-8" y="-160" width="16" height="260" fill="url(#gold)" stroke="#5a3f0a" stroke-width="2"/>
      <rect x="-50" y="80" width="100" height="20" fill="url(#gold)" stroke="#5a3f0a" stroke-width="2" rx="4"/>
      <circle cx="0" cy="130" r="14" fill="#d4a017" stroke="#5a3f0a" stroke-width="2"/>
      <rect x="-6" y="140" width="12" height="40" fill="#5a3f0a"/>
    </g>
  </g>
  <!-- Bottom banner -->
  <rect x="64" y="420" width="384" height="56" fill="#0d0d0d" stroke="#8b6914" stroke-width="3" rx="8"/>
  <text x="256" y="460" font-family="Noto Serif SC, serif" font-size="38" font-weight="700" fill="#d4a017" text-anchor="middle">三国</text>
</svg>
