<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!--
      Mobile PWA viewport (iPhone Safari + Android Chrome).
        - viewport-fit=cover: lets the app draw under the notch / home indicator
        - user-scalable=no: prevents pinch-zoom on action buttons
      API_BASE_URL is read from <meta name="api-base-url"> in app.js.
      If empty, app.js falls back to window.location.origin (same-origin).
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#16213e">
    <meta name="color-scheme" content="dark">
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.webmanifest">
    <!-- iOS PWA / Add-to-Home-Screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="三国Roguelike">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
    <!-- API base URL (override here for cross-origin iPhone access; empty = same origin) -->
    <meta name="api-base-url" content="">
    <title>三国文字Roguelike</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="title-block">
            <h1>⚔️ 三国文字Roguelike ⚔️</h1>
            <p class="subtitle">黄巾乱世，英雄四起</p>
        </div>
        <button id="btn-new-game" class="btn-primary btn-large">开始新游戏</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <!-- Top bar -->
        <div class="top-bar">
            <div class="time-loc">
                <span id="disp-time">184年1月</span>
                <span class="sep">|</span>
                <span id="disp-loc">颍川</span>
            </div>
            <div class="rank-name">
                <span id="disp-rank">散兵</span>
                <span class="sep">|</span>
                <span id="disp-name">英雄</span>
            </div>
        </div>

        <!-- Stats bar -->
        <div class="stats-bar">
            <div class="stat-item" title="生命">
                <span class="stat-icon">❤️</span>
                <div class="stat-bar-wrap"><div id="bar-hp" class="stat-bar" style="width:100%"></div></div>
                <span id="val-hp" class="stat-val">100</span>
            </div>
            <div class="stat-item" title="士气">
                <span class="stat-icon">💪</span>
                <div class="stat-bar-wrap"><div id="bar-morale" class="stat-bar morale-bar" style="width:80%"></div></div>
                <span id="val-morale" class="stat-val">80</span>
            </div>
            <div class="stat-item" title="体力">
                <span class="stat-icon">⚡</span>
                <div class="stat-bar-wrap"><div id="bar-stamina" class="stat-bar stamina-bar" style="width:100%"></div></div>
                <span id="val-stamina" class="stat-val">100</span>
            </div>
            <div class="stat-item" title="金钱">
                <span class="stat-icon">💰</span>
                <span id="val-gold" class="stat-val">50</span>
            </div>
            <div class="stat-item" title="粮草">
                <span class="stat-icon">🍖</span>
                <span id="val-food" class="stat-val">50</span>
            </div>
            <div class="stat-item" title="经验">
                <span class="stat-icon">📈</span>
                <span id="val-exp" class="stat-val">0</span>
            </div>
        </div>

        <!-- Run stats row -->
        <div class="run-stats-row" id="run-stats-row" style="display:none;padding:6px 12px;background:#16213e;border-bottom:1px solid #0f3460;font-size:12px;color:#aab;"></div>

        <!-- Main stats display -->
        <div class="main-stats">
            <div class="attr-bar-wrap" id="attr-bar-wu" title="武力">
                <span class="attr-icon">⚔️</span><span class="attr-label">武</span>
                <div class="attr-bar-bg"><div class="attr-bar-fill" id="attr-fill-wu" style="width:40%"></div></div>
                <span class="attr-val" id="stat-wu">40</span>
            </div>
            <div class="attr-bar-wrap" id="attr-bar-zhi" title="智力">
                <span class="attr-icon">🧠</span><span class="attr-label">智</span>
                <div class="attr-bar-bg"><div class="attr-bar-fill" id="attr-fill-zhi" style="width:30%"></div></div>
                <span class="attr-val" id="stat-zhi">30</span>
            </div>
            <div class="attr-bar-wrap" id="attr-bar-ming" title="名望">
                <span class="attr-icon">📜</span><span class="attr-label">名</span>
                <div class="attr-bar-bg"><div class="attr-bar-fill" id="attr-fill-ming" style="width:10%"></div></div>
                <span class="attr-val" id="stat-ming">10</span>
            </div>
            <div class="attr-bar-wrap" id="attr-bar-mei" title="魅力">
                <span class="attr-icon">💫</span><span class="attr-label">魅</span>
                <div class="attr-bar-bg"><div class="attr-bar-fill" id="attr-fill-mei" style="width:20%"></div></div>
                <span class="attr-val" id="stat-mei">20</span>
            </div>
            <div class="attr-bar-wrap" id="attr-bar-yun" title="运气">
                <span class="attr-icon">🍀</span><span class="attr-label">运</span>
                <div class="attr-bar-bg"><div class="attr-bar-fill" id="attr-fill-yun" style="width:30%"></div></div>
                <span class="attr-val" id="stat-yun">30</span>
            </div>
        </div>

        <!-- Top banners for campaigns/choices/equipment -->
        <div id="top-banners"></div>

        <!-- Event preview strip (next month upcoming events) -->
        <div id="event-preview" style="display:none;padding:6px 12px;background:#16213e;border-bottom:1px solid #0f3460;font-size:12px;color:#9a9abb;gap:10px;flex-wrap:wrap;align-items:center"></div>

        <!-- Narrative area -->
        <div id="narrative-area" class="narrative-area"></div>

        <!-- Equipment panel -->
        <div id="equipment-panel"></div>

        <!-- Action Panel -->
        <div id="action-panel" class="action-panel"></div>

        <!-- Bottom nav -->
        <div class="bottom-nav">
            <button class="nav-btn" onclick="doShowMap()">📍地图</button>
            <button class="nav-btn" id="btn-next-month" onclick="doTick()">⏭️下月</button>
            <button class="nav-btn" onclick="doShowStatus()">📊状态</button>
            <button class="nav-btn" onclick="doShowAchievements()">🏆成就</button>
            <button class="nav-btn" onclick="doShowHistory()">📜战报</button>
        </div>

        <!-- Achievements Panel (Bottom Sheet) -->
        <div id="achievements-sheet" class="bottom-sheet-overlay">
            <div class="bottom-sheet">
                <div class="sheet-handle"></div>
                <div class="sheet-title">🏆 成就列表</div>
                <div class="ach-summary" id="ach-summary" style="text-align:center;color:#d4a017;margin-bottom:12px"></div>
                <div id="ach-list" class="ach-list"></div>
                <button id="close-ach-sheet" class="action-btn" style="width:100%;margin-top:12px;min-height:48px">关闭</button>
            </div>
        </div>

        <!-- History Panel (Bottom Sheet) -->
        <div id="history-sheet" class="bottom-sheet-overlay">
            <div class="bottom-sheet">
                <div class="sheet-handle"></div>
                <div class="sheet-title">📜 本局战报</div>
                <div id="history-content"></div>
                <button id="close-history-sheet" class="action-btn" style="width:100%;margin-top:12px;min-height:48px">关闭</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
  // Service worker registration (safe: only caches static, never /api/*)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
