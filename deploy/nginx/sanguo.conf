# Nginx 反代配置（HTTPS + 缓存静态资源）
# 部署步骤：
#   1. 把 sanguo.conf 复制到 /etc/nginx/conf.d/sanguo.conf
#   2. certbot --nginx -d your-domain.com   （自动签 HTTPS 证书）
#   3. nginx -t && nginx -s reload
#
# 前置：域名已解析到 Lighthouse 公网 IP；Docker 已启动并暴露 5000

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name your-domain.com;   # 改成你的域名
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;   # 改成你的域名

    # SSL 证书（certbot 自动生成）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 通用 HTTPS 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # 静态资源 — PWA manifest / icons / sw.js 强缓存
    location ~* ^/(manifest\.webmanifest|sw\.js|icons/.*)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # 主入口 + API — 关闭缓存
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Web 支持（虽然现在没用，留着）
        proxy_http_version 1.1;
        proxy_redirect off;

        # 超时
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # 上传限制（PWA 不需要大文件，调小）
    client_max_body_size 1m;
}
